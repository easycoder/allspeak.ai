<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>EC Editor</title>
	<link rel="stylesheet" href="https://allspeak.github.io/dist/plugins/codemirror/codemirror.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.46.0/addon/dialog/dialog.css">
</head>

<body>
<pre id="ecedit-ui" style="display:none"></pre>
<pre id="allspeak-script" style="display:none"></pre>

<script>
(async function() {
	const repoBase = 'https://raw.githubusercontent.com/allspeak/allspeak.github.io/master/ecedit/';
	const ui = await fetch(repoBase + 'ecedit.json').then(r => r.text());
	document.getElementById('ecedit-ui').textContent = ui;
	const ecs = await fetch(repoBase + 'ecedit.as').then(r => r.text());
	document.getElementById('allspeak-script').textContent = ecs;

	const scripts = [
		'https://allspeak.github.io/dist/allspeak-min.js',
		'https://allspeak.github.io/dist/plugins/codemirror.js',
		'https://allspeak.github.io/dist/plugins/codemirror/codemirror.js',
		'https://cdn.jsdelivr.net/gh/allspeak/allspeak.github.io/dist/plugins/codemirror-ecs.js',
		'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.46.0/addon/dialog/dialog.js',
		'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.46.0/addon/search/search.js',
		'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.46.0/addon/search/searchcursor.js',
		'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.46.0/addon/search/jump-to-line.js'
	];
	for (const src of scripts) {
		await new Promise((resolve, reject) => {
			const s = document.createElement('script');
			s.src = src;
			s.onload = resolve;
			s.onerror = reject;
			document.head.appendChild(s);
		});
	}
	AllSpeak_Startup();
})();
</script>
</body>

</html>
