name: Deploy to allspeak.ai

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y zip rsync

      - name: Build
        run: ./build-allspeak

      - name: Prepare deploy/ directory
        run: |
          rsync -a --delete dist/ deploy/dist/
          cp asedit.as asedit.json code/server.as code/edit.html code/code-version deploy/code/
          ./build-starters

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          # Protect server-side dist/<YYMMDD>/ snapshot directories from --delete,
          # since they aren't kept in the repo.
          rsync -avz --delete \
            --filter='P /dist/[0-9]*' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            deploy/ \
            allspeak@allspeak.ai:allspeak.ai/

      - name: Snapshot dist/ to dated path
        run: |
          VERSION="$(date +%y%m%d)"
          echo "Snapshotting dist/ to dist/${VERSION}/"
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            allspeak@allspeak.ai:allspeak.ai/dist/${VERSION}/
